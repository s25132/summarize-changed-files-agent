name: "Print changed Python files"
description: "Prints changed .py files between two commits"

inputs:
  name:
    description: "Name to greet"
    required: true
    default: "World"
  base_sha:
    description: "Base commit SHA"
    required: true
  head_sha:
    description: "Head commit SHA"
    required: true

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.name }}