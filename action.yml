name: "Print changed Python files"
description: "Prints changed .py files between two commits"

inputs:
  base_sha:
    description: "Base commit SHA"
    required: true
  head_sha:
    description: "Head commit SHA"
    required: true
  github_token:
    description: "GitHub token for Copilot API"
    required: false
    default: ${{ github.token }}

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    GH_TOKEN: ${{ inputs.github_token }}