name: "Print changed Python files"
description: "Prints changed .py files between two commits"

inputs:
  base_sha:
    required: true
  head_sha:
    required: true
  copilot_token:
    description: "PAT with Copilot Requests permission"
    required: true

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    GH_TOKEN: ${{ inputs.copilot_token }}
    COPILOT_GITHUB_TOKEN: ${{ inputs.copilot_token }}
    COPILOT_ALLOW_ALL: "1"

